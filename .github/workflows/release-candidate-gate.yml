name: Release Candidate Gate

on:
  workflow_dispatch:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        run: npm ci
      - name: Run final validation
        run: npm run validate:final
      - name: Create health summary
        run: npm run health:summary
      - name: Upload validation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-candidate-validation
          path: artifacts/*.json
